version: '3.8'

networks:
  trino_network:
    driver: bridge

volumes:
  mysql-data:
  pg-data:
  minio-data:

services:
  # =======================================================
  # MySQL (ventas_db)
  # =======================================================
  mysql:
    image: mysql:8.0
    container_name: mysql
    hostname: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: demo
      MYSQL_PASSWORD: demo123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # scripts de inicialización
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - trino_network

  # =======================================================
  # PostgreSQL (productos_db)
  # =======================================================
  postgres:
    image: postgres:15
    container_name: postgres
    hostname: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo123
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      # scripts de inicialización
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - trino_network

  # =======================================================
  # MinIO
  # =======================================================
  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - trino_network

  # =======================================================
  # Iceberg REST Catalog
  # =======================================================
  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: iceberg-rest
    hostname: iceberg-rest
    restart: unless-stopped
    environment:
      CATALOG_WAREHOUSE: s3://smart-meter/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_ACCESS__KEY__ID: minio
      CATALOG_S3_SECRET__ACCESS__KEY: minio123
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_REGION: us-east-1
    ports:
      - "8181:8181"
    depends_on:
      - minio
    networks:
      - trino_network

  # =======================================================
  # Trino
  # =======================================================
  trino:
    image: trinodb/trino:472
    container_name: trino
    hostname: trino
    restart: unless-stopped
    user: root
    environment:
      - TRINO_CONFIG_DIR=/etc/trino
    volumes:
      - ./trino/conf:/etc/trino
      - ./trino/conf/catalog:/etc/trino/catalog
    depends_on:
      - mysql
      - postgres
      - minio
      - iceberg-rest
    ports:
      - "8080:8080"
    networks:
      - trino_network
